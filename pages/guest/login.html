<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in - MundiBlog</title>
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
  <!-- Bootstrap 5.3 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  
  <!-- Custom CSS (Standard Shared Assets) -->
  <link rel="stylesheet" href="../../assets/css/variables.css">
  <link rel="stylesheet" href="../../assets/css/base.css?v=5">
  <link rel="stylesheet" href="../../assets/css/layouts.css?v=4">
  <link rel="stylesheet" href="../../assets/css/components.css?v=5">
</head>
<body class="auth-body">
  <div class="auth-container">
    <div class="auth-card shadow-sm border">
      <!-- Header Logo / Title -->
      <div class="auth-header text-center mb-4">
        <a href="home.html" class="auth-logo d-inline-flex align-items-center gap-2 text-decoration-none">
          <i class="bi bi-bookmark-fill text-primary fs-3"></i>
          <span class="fs-4 fw-bold text-main">MundiBlog</span>
        </a>
        <h2 class="auth-title mt-3 fw-bold text-main" data-i18n="login">Log in</h2>
      </div>

      <!-- Alert Message -->
      <div id="authAlert" class="alert alert-danger d-none p-2.5 rounded-3 mb-3 small" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-1"></i> <span id="authAlertText">Error message here.</span>
      </div>

      <!-- Login Form -->
      <form id="loginForm" novalidate>
        <div class="mb-3">
          <label for="loginEmail" class="form-label font-medium small" data-i18n="col_email">Email</label>
          <div class="input-group">
            <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="bi bi-envelope"></i></span>
            <input type="email" id="loginEmail" class="form-control border-start-0 ps-0" placeholder="name@example.com" required>
          </div>
        </div>
        
        <div class="mb-4">
          <div class="d-flex justify-content-between align-items-center mb-1">
            <label for="loginPassword" class="form-label font-medium small mb-0" data-i18n="password">Password</label>
          </div>
          <div class="input-group">
            <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="bi bi-lock"></i></span>
            <input type="password" id="loginPassword" class="form-control border-start-0 border-end-0 ps-0" placeholder="••••••••" required>
            <button type="button" class="btn border border-start-0 text-muted bg-transparent" id="togglePasswordBtn" aria-label="Toggle password visibility">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-100 py-2.5 rounded-pill fw-semibold mb-3" data-i18n="login">Log in</button>
      </form>

      <!-- Redirect to Register -->
      <div class="text-center text-muted small mb-4">
        <span data-i18n="dont_have_account">Don't have an account?</span> <a href="register.html" class="text-primary fw-semibold text-decoration-none" data-i18n="register_here">Register here</a>
      </div>

      <!-- Quick Login Section -->
      <div class="quick-login-section border-top pt-3">
        <div class="text-center text-muted small fw-semibold mb-2" data-i18n="quick_demo_login">QUICK DEMO LOGIN</div>
        <div class="d-flex gap-2">
          <button class="btn btn-outline-secondary btn-sm flex-fill py-2 d-flex align-items-center justify-content-center gap-1.5 rounded-3" id="quickLoginElena">
            <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&q=80&w=40&h=40" width="20" height="20" class="rounded-circle" alt="Elena">
            <span>Elena (Member)</span>
          </button>
          <button class="btn btn-outline-secondary btn-sm flex-fill py-2 d-flex align-items-center justify-content-center gap-1.5 rounded-3" id="quickLoginAdmin">
            <i class="bi bi-shield-lock-fill text-primary"></i>
            <span>Admin</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap 5 JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Core Script containing theme & language simulation -->
  <script src="../../assets/js/core.js?v=4"></script>
</body>
</html>
