<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MundiBlog - Multilingual AI-Translated Feed</title>
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Bootstrap 5.3 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  
  <!-- Custom CSS (Standard Shared Assets) -->
  <link rel="stylesheet" href="../../assets/css/variables.css">
  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/layouts.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  
  <style>
    .substack-logo-container {
      padding: 0.5rem 0.75rem 1.5rem 0.75rem;
    }
    
    .substack-logo {
      font-size: 1.6rem;
      color: var(--primary-color);
      font-weight: 800;
      letter-spacing: -0.04em;
    }
    
    .sidebar-create-btn {
      background-color: var(--primary-color) !important;
      border-color: var(--primary-color) !important;
      color: #ffffff !important;
      border-radius: 99px !important;
      padding: 0.65rem 1.5rem !important;
      font-weight: 600 !important;
      font-size: 0.95rem !important;
      width: 100%;
      text-align: center;
      margin-top: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: all var(--transition-speed) ease;
    }
    
    .sidebar-create-btn:hover {
      background-color: var(--primary-hover) !important;
      border-color: var(--primary-hover) !important;
    }
    
    .sidebar-footer-menu {
      margin-top: auto;
      padding-top: 1.25rem;
      border-top: 1px solid var(--border-color);
    }
    
    .footer-control-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 0.75rem;
      margin-bottom: 0.75rem;
    }
    
    /* Center Column Elements matching user screenshot */
    .quick-draft-card {
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 0.85rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.85rem;
      margin-bottom: 1.5rem;
      cursor: pointer;
      background-color: var(--bg-panel);
    }
    
    .quick-draft-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      object-fit: cover;
    }
    
    .quick-draft-placeholder {
      color: var(--text-muted);
      font-size: 0.95rem;
      flex: 1;
    }
    
    .feed-filter-row {
      display: flex;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    
    .feed-filter-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-weight: 600;
      font-size: 0.875rem;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.25rem 0.5rem;
    }
    
    /* Substack Post Card redesign matching screenshots */
    .substack-post {
      padding: 1.75rem 0;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    
    .substack-post-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .author-badge-group {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    
    .author-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      object-fit: cover;
    }
    
    .author-meta-info {
      display: flex;
      flex-direction: column;
    }
    
    .author-name {
      font-weight: 600;
      color: var(--text-main);
      font-size: 0.9rem;
      text-decoration: none;
    }
    
    .post-timestamp {
      font-size: 0.75rem;
      color: var(--text-muted);
    }
    
    .btn-subscribe-author {
      background-color: transparent;
      border: none;
      color: var(--primary-color);
      font-weight: 600;
      font-size: 0.8rem;
      padding: 0.2rem 0.5rem;
      transition: color var(--transition-speed) ease;
    }
    
    .btn-subscribe-author:hover {
      color: var(--primary-hover);
    }
    
    .translation-trigger {
      font-size: 0.75rem;
      color: var(--primary-color);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      font-weight: 600;
      text-decoration: none;
    }
    
    .translation-trigger:hover {
      text-decoration: underline;
    }
    
    .substack-post-content {
      font-size: 0.95rem;
      color: var(--text-main);
      line-height: 1.55;
      letter-spacing: -0.01em;
      white-space: pre-line;
    }
    
    .post-image-embed {
      border-radius: 12px;
      max-height: 360px;
      overflow: hidden;
      margin-top: 0.5rem;
      border: 1px solid var(--border-color);
    }
    
    .post-image-embed img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    /* Interactive stats footer matching Substack icons */
    .substack-post-footer {
      display: flex;
      align-items: center;
      gap: 2rem;
      margin-top: 0.75rem;
      padding-top: 0.25rem;
    }
    
    .footer-action-item {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      color: var(--text-muted);
      font-size: 0.85rem;
      background: transparent;
      border: none;
      padding: 0.25rem 0.5rem;
      transition: color var(--transition-speed) ease;
    }
    
    .footer-action-item:hover {
      color: var(--text-main);
    }
    
    .footer-action-item.liked {
      color: var(--primary-color);
    }
    
    /* Right Panel recommended container */
    .subscriptions-widget {
      background-color: var(--bg-panel);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
  </style>
</head>
<body>
  <div class="app-wrapper">
    
    <!-- MOBILE HEADER -->
    <header class="app-header">
      <div class="header-container">
        <button class="btn btn-link d-lg-none me-2 text-reset p-0" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobileSidebar" aria-controls="mobileSidebar">
          <i class="bi bi-list fs-3"></i>
        </button>
        <a href="home.html" class="d-flex align-items-center text-decoration-none">
          <i class="bi  bi-feather fs-4 text-primary me-2"></i>
          <span class="fs-5 fw-bold text-main">MundiBlog</span>
        </a>
        <div class="d-flex align-items-center ms-auto gap-2">
          <a href="../owner/create-post.html" class="btn btn-primary btn-sm fw-medium px-3 rounded-pill"><i class="bi bi-plus-lg me-1"></i> <span data-i18n="create">Create</span></a>
          <a href="../owner/profile.html" class="text-decoration-none">
            <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&q=80&w=32&h=32" class="rounded-circle border" width="32" height="32" alt="Avatar">
          </a>
        </div>
      </div>
    </header>

    <!-- 3-COLUMN LAYOUT -->
    <main class="app-main-content">
      
      <!-- COLUMN 1: LEFT SIDEBAR NAVIGATION -->
      <aside class="left-sidebar"></aside>

      <!-- COLUMN 2: CENTER WORKSPACE FEED -->
      <div class="center-feed">
        
        <!-- Mobile Search Box (Visible only on screens where right sidebar is hidden) -->
        <div class="d-lg-none w-100 mb-3">
          <div class="right-search-box w-100">
            <i class="bi bi-search"></i>
            <input type="text" id="mobileFeedSearchInput" placeholder="Search MundiBlog..." oninput="filterFeedPosts(this.value)" data-i18n="search_placeholder">
          </div>
        </div>

        <!-- What do you have in mind? Quick draft input card -->
        <div class="quick-draft-card" id="quickDraftCard" onclick="window.location.href='../owner/create-post.html'">
          <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&q=80&w=100&h=100" alt="Avatar" class="quick-draft-avatar" id="quickDraftAvatar">
          <div class="quick-draft-placeholder" data-i18n="what_on_mind">What is on your mind?</div>
        </div>

        <!-- Filter tabs aligning categories translations -->
        <div class="feed-filter-row">
          <div class="dropdown">
            <button class="feed-filter-btn" type="button" data-bs-toggle="dropdown" aria-expanded="false">
              <span id="currentCategoryLabel" data-i18n="for_you">For you</span> <i class="bi bi-chevron-down"></i>
            </button>
            <ul class="dropdown-menu shadow border-light-subtle">
              <li><a class="dropdown-item active" href="#" onclick="selectCategory(event, 'all', 'for_you')"><span data-i18n="for_you">For you</span></a></li>
              <li><a class="dropdown-item" href="#" onclick="selectCategory(event, 'Artificial Intelligence', 'cat_ai')"><span data-i18n="cat_ai">Artificial Intelligence</span></a></li>
              <li><a class="dropdown-item" href="#" onclick="selectCategory(event, 'Backend Engineering', 'cat_backend')"><span data-i18n="cat_backend">Backend Engineering</span></a></li>
              <li><a class="dropdown-item" href="#" onclick="selectCategory(event, 'Design', 'cat_design')"><span data-i18n="cat_design">Design</span></a></li>
              <li><a class="dropdown-item" href="#" onclick="selectCategory(event, 'Frontend Development', 'cat_frontend')"><span data-i18n="cat_frontend">Frontend Development</span></a></li>
              <li><a class="dropdown-item" href="#" onclick="selectCategory(event, 'Mobile Development', 'cat_mobile')"><span data-i18n="cat_mobile">Mobile Development</span></a></li>
              <li><a class="dropdown-item" href="#" onclick="selectCategory(event, 'Data Science', 'cat_data')"><span data-i18n="cat_data">Data Science</span></a></li>
              <li><a class="dropdown-item" href="#" onclick="selectCategory(event, 'Cybersecurity', 'cat_cyber')"><span data-i18n="cat_cyber">Cybersecurity</span></a></li>
            </ul>
          </div>
        </div>

        <!-- Posts List Feed Container (Dynamic matching search filters & language filter) -->
        <div id="postsFeedContainer" class="mt-3">
          <!-- Posts will be dynamically rendered here by components.js -->
        </div>
      </div>

      <!-- RIGHT PANEL (Recommended Authors, Search, Footer) -->
      <!-- COLUMN 3: RIGHT PANEL (Search, Widgets, App promo) -->
      <aside class="right-panel"></aside>

    </main>
  </div>

  <!-- MOBILE SIDEBAR / OFFCANVAS -->
  <div class="offcanvas offcanvas-start" tabindex="-1" id="mobileSidebar" aria-labelledby="mobileSidebarLabel"></div>

  <!-- Bootstrap 5 JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Core Script containing theme & language simulation -->
  <script src="../../assets/js/core.js"></script>
  <script src="../../assets/js/components.js"></script>
  
  <script>
    // Live Search Filter for feed matching title or author name
    function filterFeedPosts(val) {
      const desktopInput = document.getElementById('feedSearchInput');
      const mobileInput = document.getElementById('mobileFeedSearchInput');
      const sidebarInput = document.getElementById('sidebarSearchInput');
      
      const filter = (val !== undefined ? val : (desktopInput ? desktopInput.value : '')).toLowerCase();
      if (desktopInput && desktopInput.value.toLowerCase() !== filter) desktopInput.value = filter;
      if (mobileInput && mobileInput.value.toLowerCase() !== filter) mobileInput.value = filter;
      if (sidebarInput && sidebarInput.value.toLowerCase() !== filter) sidebarInput.value = filter;

      const posts = document.querySelectorAll('#postsFeedContainer .substack-post');
      
      posts.forEach(post => {
        const titleText = post.querySelector('.post-title').textContent.toLowerCase();
        const authorText = post.querySelector('.author-name').textContent.toLowerCase();
        const contentText = post.querySelector('.post-content').textContent.toLowerCase();
        
        if (titleText.includes(filter) || authorText.includes(filter) || contentText.includes(filter)) {
          post.classList.remove('d-none');
        } else {
          post.classList.add('d-none');
        }
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const searchQuery = urlParams.get('search');
      if (searchQuery) {
        const desktopInput = document.getElementById('feedSearchInput');
        const mobileInput = document.getElementById('mobileFeedSearchInput');
        if (desktopInput) desktopInput.value = searchQuery;
        if (mobileInput) mobileInput.value = searchQuery;
        filterFeedPosts(searchQuery);
      }

      // Render posts dynamically from core data
      if (typeof window.renderFeedPosts === 'function') {
        window.renderFeedPosts('postsFeedContainer', window.globalPostsData, window.currentSelectedCategory || 'all');
      }
    });

    // Toggle Feed Likes simulation (Maps to post_likes table)
    function toggleLike(btn, baseCount) {
      const icon = btn.querySelector('i');
      const text = btn.querySelector('.like-count');
      const isLiked = btn.classList.toggle('liked');
      
      if (isLiked) {
        icon.className = 'bi bi-heart-fill';
        text.textContent = baseCount + 1;
      } else {
        icon.className = 'bi bi-heart';
        text.textContent = baseCount;
      }
    }
  </script>
</body>
</html>
