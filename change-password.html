<!doctype html>
<html lang="en" data-bs-theme="light">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/images/lingora-mark.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change password | Lingora</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="assets/css/variables.css">
    <link rel="stylesheet" href="assets/css/base.css?v=5">
    <style>
      :root {
        --bg: #141616;
        --panel: #181a1a;
        --panel-soft: #222525;
        --line: #303333;
        --text: #f4f4f4;
        --muted: #a4a6a8;
        --accent: #ff6719;
        --accent-contrast: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        color: var(--text);
        background: var(--bg);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      button,
      input {
        font: inherit;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .password-page {
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .password-topbar {
        min-height: 76px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        padding: 0 clamp(18px, 4vw, 54px);
        border-bottom: 1px solid var(--line);
      }

      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: var(--muted);
        font-weight: 800;
      }

      .back-link:hover,
      .back-link:focus-visible {
        color: var(--text);
        outline: none;
      }

      .brand {
        color: var(--text);
        font-size: 20px;
        font-weight: 900;
        letter-spacing: -0.02em;
      }

      .password-main {
        display: grid;
        place-items: start center;
        padding: clamp(34px, 7vw, 84px) 18px;
      }

      .password-card {
        width: min(620px, 100%);
        padding: clamp(24px, 5vw, 42px);
        border: 1px solid var(--line);
        border-radius: 14px;
        background: var(--panel);
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.28);
      }

      .password-card header {
        margin-bottom: 34px;
      }

      .password-icon {
        display: grid;
        place-items: center;
        width: 58px;
        height: 58px;
        margin-bottom: 22px;
        border-radius: 12px;
        color: var(--accent-contrast);
        background: var(--accent);
        font-size: 28px;
      }

      .password-card h1 {
        margin: 0;
        color: var(--text);
        font-size: clamp(30px, 5vw, 44px);
        line-height: 1.05;
        letter-spacing: -0.02em;
      }

      .password-card p {
        margin: 12px 0 0;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.5;
      }

      .password-form {
        display: grid;
        gap: 22px;
      }

      .field {
        display: grid;
        gap: 10px;
      }

      .field label {
        font-size: 15px;
        font-weight: 900;
      }

      .password-input-wrap {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 48px;
        align-items: center;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: color-mix(in srgb, var(--bg) 80%, var(--text) 20%);
        overflow: hidden;
      }

      .password-input-wrap:focus-within {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 24%, transparent);
      }

      .password-input-wrap input {
        min-height: 54px;
        width: 100%;
        border: 0;
        padding: 0 16px;
        color: var(--text);
        background: transparent;
        outline: none;
        font-size: 17px;
      }

      .password-input-wrap input::-ms-reveal,
      .password-input-wrap input::-ms-clear {
        display: none;
        width: 0;
        height: 0;
      }

      .toggle-password {
        width: 48px;
        height: 54px;
        border: 0;
        color: var(--muted);
        background: transparent;
        font-size: 20px;
      }

      .toggle-password:hover,
      .toggle-password:focus-visible {
        color: var(--text);
        outline: none;
      }

      .password-hint,
      .password-message {
        min-height: 20px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }

      .password-message.is-error {
        color: #ff6b66;
      }

      .password-message.is-success {
        color: #38d6cb;
      }

      .form-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-top: 8px;
      }

      .btn {
        min-height: 52px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        border: 0;
        border-radius: 10px;
        font-weight: 900;
      }

      .btn-secondary {
        color: var(--text);
        background: var(--panel-soft);
      }

      .btn-primary {
        color: var(--accent-contrast);
        background: var(--accent);
      }

      .btn-primary:disabled {
        color: color-mix(in srgb, var(--text) 46%, transparent);
        background: color-mix(in srgb, var(--panel-soft) 74%, var(--text) 26%);
        cursor: not-allowed;
      }

      @media (max-width: 560px) {
        .password-topbar {
          align-items: flex-start;
          flex-direction: column;
          padding-top: 18px;
          padding-bottom: 18px;
        }

        .form-actions {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="password-page">
      <header class="password-topbar">
        <a class="back-link" href="profile.html">
          <i class="bi bi-arrow-left"></i>
          <span data-i18n="back_to_profile">Back to profile</span>
        </a>
        <a class="brand" href="index.html">Lingora</a>
      </header>

      <main class="password-main">
        <section class="password-card" aria-labelledby="changePasswordTitle">
          <header>
            <div class="password-icon" aria-hidden="true"><i class="bi bi-shield-lock"></i></div>
            <h1 id="changePasswordTitle" data-i18n="change_password">Change password</h1>
            <p data-i18n="password_description_long">Update the password for your Lingora account. Use a strong password that you do not use anywhere else.</p>
          </header>

          <form class="password-form" data-password-form>
            <div class="field">
              <label for="currentPassword" data-i18n="current_password_label">Current password</label>
              <div class="password-input-wrap">
                <input id="currentPassword" type="password" autocomplete="current-password" data-password-field>
                <button class="toggle-password" type="button" aria-label="Show current password" data-toggle-password>
                  <i class="bi bi-eye" aria-hidden="true"></i>
                </button>
              </div>
              <span id="currentPasswordError" class="password-message is-error" aria-live="polite"></span>
            </div>

            <div class="field">
              <label for="newPassword" data-i18n="new_password_label">New password</label>
              <div class="password-input-wrap">
                <input id="newPassword" type="password" autocomplete="new-password" data-password-field>
                <button class="toggle-password" type="button" aria-label="Show new password" data-toggle-password>
                  <i class="bi bi-eye" aria-hidden="true"></i>
                </button>
              </div>
              <span id="newPasswordHint" class="password-hint" data-i18n="password_min_hint">Use at least 8 characters.</span>
              <span id="newPasswordError" class="password-message is-error" aria-live="polite"></span>
            </div>

            <div class="field">
              <label for="confirmPassword" data-i18n="confirm_new_password_label">Confirm new password</label>
              <div class="password-input-wrap">
                <input id="confirmPassword" type="password" autocomplete="new-password" data-password-field>
                <button class="toggle-password" type="button" aria-label="Show confirm password" data-toggle-password>
                  <i class="bi bi-eye" aria-hidden="true"></i>
                </button>
              </div>
              <span id="confirmPasswordError" class="password-message is-error" aria-live="polite"></span>
            </div>
            
            <span id="globalMessage" class="password-message" aria-live="polite"></span>

            <div class="form-actions">
              <a class="btn btn-secondary" href="profile.html" data-i18n="cancel">Cancel</a>
              <button class="btn btn-primary" type="submit" data-submit-password data-i18n="update_password" disabled>Update password</button>
            </div>
          </form>
        </section>
      </main>
    </div>

<script src="assets/js/core.js?v=19" charset="UTF-8"></script>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const form = document.querySelector('[data-password-form]');
        const fields = document.querySelectorAll('[data-password-field]');
        const currentPassword = document.getElementById('currentPassword');
        const newPassword = document.getElementById('newPassword');
        const confirmPassword = document.getElementById('confirmPassword');
        const submitButton = document.querySelector('[data-submit-password]');
        
        const currentPasswordError = document.getElementById('currentPasswordError');
        const newPasswordError = document.getElementById('newPasswordError');
        const confirmPasswordError = document.getElementById('confirmPasswordError');
        const globalMessage = document.getElementById('globalMessage');
        const newPasswordHint = document.getElementById('newPasswordHint');

        function applyStoredBranding() {
          try {
            const profile = JSON.parse(localStorage.getItem('mundiBlogProfile') || '{}');
            const accent = profile.accentColor || '';
            const background = profile.backgroundColor || '';
            if (accent) document.documentElement.style.setProperty('--accent', accent);
            if (background) document.documentElement.style.setProperty('--bg', background);
          } catch (error) {
            // Keep default page colors.
          }
        }

        function setGlobalMessage(text = '', state = '') {
          if (!globalMessage) return;
          globalMessage.textContent = text;
          globalMessage.classList.toggle('is-error', state === 'error');
          globalMessage.classList.toggle('is-success', state === 'success');
        }

        function getPageTranslation(key, fallback) {
          const lang = localStorage.getItem('preferredLanguage') || 'en';
          const dictionaries = window.uiTranslations || {};
          const dictionary = dictionaries[lang] || dictionaries.en || {};
          return dictionary[key] || fallback;
        }

        function validateForm() {
          const hasAllValues = Array.from(fields).every(field => field.value.trim());
          const longEnough = newPassword.value.length >= 8;
          const isDifferent = currentPassword.value && newPassword.value && currentPassword.value !== newPassword.value;
          const matches = newPassword.value && newPassword.value === confirmPassword.value;

          // Clear previous errors
          newPasswordError.textContent = '';
          currentPasswordError.textContent = '';
          confirmPasswordError.textContent = '';
          setGlobalMessage('', '');
          
          if (newPasswordHint) {
            newPasswordHint.style.display = newPassword.value.length === 0 ? 'block' : 'none';
          }

          let hasError = false;

          if (newPassword.value && !longEnough) {
            newPasswordError.textContent = getPageTranslation('password_min_error', 'New password must be at least 8 characters.');
            hasError = true;
          } else if (newPassword.value && currentPassword.value && !isDifferent) {
            newPasswordError.textContent = getPageTranslation('password_same_error', 'New password must be different from current password.');
            hasError = true;
          }

          if (confirmPassword.value && !matches) {
            confirmPasswordError.textContent = getPageTranslation('password_mismatch_error', 'New passwords do not match.');
            hasError = true;
          }

          submitButton.disabled = !(hasAllValues && longEnough && isDifferent && matches);
        }

        document.querySelectorAll('[data-toggle-password]').forEach(button => {
          button.addEventListener('click', () => {
            const input = button.parentElement.querySelector('input');
            const icon = button.querySelector('i');
            const shouldShow = input.type === 'password';

            input.type = shouldShow ? 'text' : 'password';
            button.setAttribute('aria-label', shouldShow ? 'Hide password' : 'Show password');
            if (icon) {
              icon.classList.toggle('bi-eye', !shouldShow);
              icon.classList.toggle('bi-eye-slash', shouldShow);
            }
          });
        });

        fields.forEach(field => field.addEventListener('input', validateForm));

        form.addEventListener('submit', event => {
          event.preventDefault();
          validateForm();
          if (submitButton.disabled) return;

          localStorage.setItem('mundiPasswordChangedAt', new Date().toISOString());
          form.reset();
          submitButton.disabled = true;
          setGlobalMessage(getPageTranslation('password_success', 'Password updated successfully.'), 'success');
        });

        applyStoredBranding();
        validateForm();
      });
    </script>
  </body>
</html>
