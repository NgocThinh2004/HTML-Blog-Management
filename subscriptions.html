<!DOCTYPE html>
<html lang="en" data-bs-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MundiBlog - Multilingual AI-Translated Feed</title>
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap"
    rel="stylesheet">
  <!-- Bootstrap 5.3 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <!-- Custom CSS (Standard Shared Assets) -->
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/base.css?v=5">
  <link rel="stylesheet" href="assets/css/layouts.css?v=4">
  <link rel="stylesheet" href="assets/css/components.css?v=12">
  
</head>

<body>
  <div class="app-wrapper">

    <!-- MOBILE HEADER -->
    <header class="app-header">
      <div class="header-container">
        <button class="btn btn-link d-lg-none me-2 text-reset p-0" type="button" data-bs-toggle="offcanvas"
          data-bs-target="#mobileSidebar" aria-controls="mobileSidebar">
          <i class="bi bi-list fs-3"></i>
        </button>
        <a href="index.html" class="d-flex align-items-center text-decoration-none">
          <i class="bi  bi-feather fs-4 text-primary me-2"></i>
          <span class="fs-5 fw-bold text-main">Lingora</span>
        </a>
        <div class="d-flex align-items-center ms-auto gap-2">
          <a href="create-post.html" class="btn btn-primary btn-sm fw-medium px-2 px-sm-3 rounded-pill d-inline-flex align-items-center me-1"><i
              class="bi bi-plus-lg me-1"></i> <span data-i18n="create">Create</span></a>

          <a href="profile.html" class="text-decoration-none">
            <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&q=80&w=32&h=32"
              class="rounded-circle border" width="32" height="32" alt="Avatar">
          </a>
        </div>
      </div>
    </header>

    <!-- 3-COLUMN LAYOUT -->
    <main class="app-main-content">

      <!-- COLUMN 1: LEFT SIDEBAR NAVIGATION (Loaded via components.js SSoT) -->
      <aside class="left-sidebar"></aside>

      <!-- COLUMN 2: CENTER WORKSPACE FEED -->
      <div class="center-feed">

        <!-- Mobile Search Box (Visible only on screens where right sidebar is hidden) -->
        <div class="d-lg-none w-100 mb-3">
          <div class="right-search-box w-100">
            <i class="bi bi-search"></i>
            <input type="text" id="mobileFeedSearchInput" placeholder="Search MundiBlog..."
              oninput="filterFeedPosts(this.value)" data-i18n="search_placeholder">
          </div>
        </div>

        <!-- Authors Carousel & Feed (Visible when having subscriptions) -->
        <div id="subscriptionsContent">
          <!-- Authors Carousel without colored ring -->
          <div class="authors-carousel-container" id="subscriptionsAuthorsCarousel">
            <!-- Dynamically rendered by JS -->
          </div>

          <!-- 3-Tabs Navigation for Subscriptions Feed -->
          <div class="subscriptions-tabs-nav">
            <button class="subscriptions-tab-btn active" data-tab="all" data-i18n="sub_tab_all">All Posts</button>
            <button class="subscriptions-tab-btn" data-tab="manage" data-i18n="sub_tab_manage">Đang theo dõi</button>
          </div>

          <!-- Posts or Manage Grid Container -->
          <div id="postsFeedContainer" class="pb-5">
            <!-- Dynamically rendered -->
          </div>
        </div>

        <!-- EMPTY STATE (Visible when following 0 authors) -->
        <div id="emptySubscriptionsState" class="text-center py-5 mt-3" style="display: none;">
          <div class="mb-4 d-flex justify-content-center">
            <div style="width: 120px; height: 120px; border-radius: 50%; background: var(--bg-secondary); display: flex; align-items: center; justify-content: center;">
              <i class="bi bi-person-lines-fill text-muted" style="font-size: 3rem;"></i>
            </div>
          </div>
          <h4 class="fw-bold text-main mb-2" data-i18n="sub_empty_title">You haven't followed any authors yet</h4>
          <p class="text-muted mb-4 mx-auto" style="max-width: 400px;" data-i18n="sub_empty_desc">Discover insightful articles and follow authors so you never miss their latest updates!</p>
          
          <h5 class="fw-bold mb-4 mt-4 text-start border-bottom pb-2" data-i18n="sub_suggested_authors">Suggested Authors</h5>
          <div class="row text-start" id="suggestedAuthorsGrid">
            <!-- Populated by JS -->
          </div>
        </div>
      </div>

      <!-- COLUMN 3: RIGHT PANEL (Loaded via components.js SSoT) -->
      <aside class="right-panel"></aside>

    </main>
  </div>

  <!-- MOBILE SIDEBAR / OFFCANVAS -->
  <div class="offcanvas offcanvas-start" tabindex="-1" id="mobileSidebar" aria-labelledby="mobileSidebarLabel"></div>

  <!-- Bootstrap 5 JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
  <!-- Core Script containing theme & language simulation -->
  <script src="assets/js/core.js?v=9" defer></script>
  <script src="assets/js/components.js" defer></script>

  <script>
    // Subscribed Authors state management
    let _cachedSubscribedAuthors = null;
    function getSubscribedAuthorsList() {
      if (_cachedSubscribedAuthors !== null) return _cachedSubscribedAuthors;
      const stored = localStorage.getItem('lingoraSubscribedAuthors');
      if (stored !== null) {
        try { _cachedSubscribedAuthors = JSON.parse(stored); return _cachedSubscribedAuthors; } catch (e) { }
      }
      // Default initial subscribed authors
      const defaults = ['Elena Rostova', 'Hồ Quốc Tuấn', 'Thái Dương'];
      localStorage.setItem('lingoraSubscribedAuthors', JSON.stringify(defaults));
      _cachedSubscribedAuthors = defaults;
      return defaults;
    }

    function toggleAuthorSubscription(authorName, e) {
      if (e) { e.preventDefault(); e.stopPropagation(); }
      let list = getSubscribedAuthorsList();
      const idx = list.indexOf(authorName);
      const isSubscribing = idx < 0;

      if (!isSubscribing) {
        list.splice(idx, 1);
      } else {
        list.push(authorName);
      }
      localStorage.setItem('lingoraSubscribedAuthors', JSON.stringify(list));

      // 1. Precise button UI update
      if (e && e.currentTarget && typeof window.toggleSubscribe === 'function') {
        window.toggleSubscribe(e.currentTarget, null);
      }

      // 2. Toast Notification
      if (typeof window.showLingoraToast === 'function') {
        const currentLang = localStorage.getItem('preferredLanguage') || 'en';
        const dict = (window.uiTranslations && window.uiTranslations[currentLang]) || {};
        const msg = isSubscribing ? `${dict.btn_following || 'Following'} ${authorName}` : `Unsubscribed from ${authorName}`;
        window.showLingoraToast(msg);
      }

      // 3. Precise DOM update to avoid full re-render
      if (!isSubscribing) {
        // Unfollow: remove from carousel
        const carousel = document.getElementById('subscriptionsAuthorsCarousel');
        if (carousel) {
          const items = carousel.querySelectorAll('.author-carousel-item');
          items.forEach(item => {
            const nameEl = item.querySelector('.author-carousel-name');
            if (nameEl && nameEl.textContent === authorName) {
              item.remove();
            }
          });
        }
        
        // Unfollow: remove posts from feed if on 'all' tab
        if (window.currentSubTab === 'all') {
          const feedContainer = document.getElementById('postsFeedContainer');
          if (feedContainer) {
            const posts = feedContainer.querySelectorAll('.substack-post');
            posts.forEach(post => {
              const authorEl = post.querySelector('.author-name');
              if (authorEl && authorEl.textContent.trim() === authorName) {
                post.remove();
              }
            });
            // Re-render if feed is now empty
            if (feedContainer.querySelectorAll('.substack-post').length === 0) {
               renderSubscriptionsPage(window.currentSubTab, window.currentAuthorFilter, false);
            }
          }
        }
        
        // Re-render empty state if list is entirely empty
        if (list.length === 0) {
           renderSubscriptionsPage(window.currentSubTab, window.currentAuthorFilter, false);
        }
      } else {
        // Follow: re-render to fetch new posts and apply translations
        renderSubscriptionsPage(window.currentSubTab, window.currentAuthorFilter, false);
      }
    }

    let currentSubTab = 'all';
    let currentAuthorFilter = '';

    function renderSubscriptionsPage(tab = 'all', authorFilter = '', skipTranslations = false) {
      window.currentSubTab = tab;
      window.currentAuthorFilter = authorFilter;
      const subs = getSubscribedAuthorsList();
      const contentDiv = document.getElementById('subscriptionsContent');
      const emptyDiv = document.getElementById('emptySubscriptionsState');
      const currentLang = localStorage.getItem('preferredLanguage') || 'en';
      const dict = (window.uiTranslations && window.uiTranslations[currentLang]) || (window.uiTranslations && window.uiTranslations.en) || {};

      if (subs.length === 0) {
        if (contentDiv) contentDiv.style.display = 'none';
        if (emptyDiv) {
          emptyDiv.style.display = 'block';
          renderSuggestedAuthors(subs, dict);
        }
        if (!skipTranslations && window.applyUiTranslations) window.applyUiTranslations(currentLang);
        return;
      } else {
        if (contentDiv) contentDiv.style.display = 'block';
        if (emptyDiv) emptyDiv.style.display = 'none';
      }

      // 1. Render Authors Carousel without colored borders
      const carousel = document.getElementById('subscriptionsAuthorsCarousel');
      if (carousel) {
        const allAuthorsLabel = dict.sub_all_authors_filter || "All Authors";
        const findMoreLabel = dict.find_more || "Find more";
        let html = `
          <div class="author-carousel-item ${authorFilter === '' ? 'active' : ''}" onclick="filterByAuthor('')">
            <div class="author-carousel-avatar-wrapper d-flex align-items-center justify-content-center bg-light">
              <i class="bi bi-people fs-4 text-main"></i>
            </div>
            <span class="author-carousel-name">${allAuthorsLabel}</span>
          </div>
        `;

        const authorProfiles = {
          'Elena Rostova': 'https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&q=80&w=80&h=80',
          'Hồ Quốc Tuấn': 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?auto=format&fit=crop&q=80&w=80&h=80',
          'Thái Dương': 'https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?auto=format&fit=crop&q=80&w=80&h=80',
          'Hoàng Anh': 'https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&q=80&w=80&h=80',
          'Sarah Connor': 'https://images.unsplash.com/photo-1544005313-94ddf0286df2?auto=format&fit=crop&q=80&w=80&h=80'
        };

        subs.forEach(name => {
          const avatar = authorProfiles[name] || 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&q=80&w=80&h=80';
          const isActive = authorFilter === name ? 'active' : '';
          html += `
            <div class="author-carousel-item ${isActive}" onclick="filterByAuthor('${name.replace(/'/g, "\\'")}')">
              <div class="author-carousel-avatar-wrapper">
                <img src="${avatar}" alt="${name}" class="author-carousel-avatar">
              </div>
              <span class="author-carousel-name">${name}</span>
            </div>
          `;
        });

        html += `
          <a href="explore.html" class="author-carousel-item text-decoration-none">
            <div class="author-carousel-avatar-wrapper d-flex align-items-center justify-content-center bg-light">
              <i class="bi bi-plus-lg fs-5 text-muted"></i>
            </div>
            <span class="author-carousel-name">${findMoreLabel}</span>
          </a>
        `;
        carousel.innerHTML = html;
      }

      // 2. Update Tabs Active State
      document.querySelectorAll('.subscriptions-tab-btn').forEach(btn => {
        if (btn.getAttribute('data-tab') === tab) {
          btn.classList.add('active');
        } else {
          btn.classList.remove('active');
        }
      });

      // 3. Render Feed or Manage Grid
      const feedContainer = document.getElementById('postsFeedContainer');
      if (!feedContainer) return;

      if (tab === 'manage') {
        const authorRoles = {
          'Elena Rostova': 'Artificial Intelligence Lead',
          'Hồ Quốc Tuấn': 'Economics Lead',
          'Thái Dương': 'Tech Lead & Architecture',
          'Hoàng Anh': 'UX & Product Design',
          'Sarah Connor': 'Security Systems Lead'
        };
        const authorProfiles = {
          'Elena Rostova': 'https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&q=80&w=80&h=80',
          'Hồ Quốc Tuấn': 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?auto=format&fit=crop&q=80&w=80&h=80',
          'Thái Dương': 'https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?auto=format&fit=crop&q=80&w=80&h=80',
          'Hoàng Anh': 'https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&q=80&w=80&h=80',
          'Sarah Connor': 'https://images.unsplash.com/photo-1544005313-94ddf0286df2?auto=format&fit=crop&q=80&w=80&h=80'
        };

        let manageHtml = `<div class="row g-3">`;
        subs.forEach(name => {
          const avatar = authorProfiles[name] || 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&q=80&w=80&h=80';
          const role = authorRoles[name] || 'MundiBlog Creator';
          const followingLabel = dict.btn_following || "Following";
          manageHtml += `
            <div class="col-12">
              <div class="manage-author-card h-100">
                <img src="${avatar}" class="rounded-circle border" width="54" height="54" style="object-fit: cover;" alt="${name}">
                <div class="flex-grow-1">
                  <h6 class="fw-bold mb-1 text-main">${name}</h6>
                  <p class="text-muted small mb-0">${role}</p>
                </div>
                <button class="btn btn-outline-secondary btn-sm rounded-pill px-3 fw-medium subscribed btn-subscribe" data-unfollow-label="${dict.btn_unfollow || 'Bỏ theo dõi'}" onclick="toggleAuthorSubscription('${name.replace(/'/g, "\\'")}', event)"><span class="btn-subscribe-label">${followingLabel}</span></button>
              </div>
            </div>
          `;
        });
        manageHtml += `</div>`;
        feedContainer.innerHTML = manageHtml;
      } else {
        // Render Posts matching Subscribed Authors (and authorFilter)
        const dataObj = window.globalPostsData || {};
        let matchingPosts = {};
        let count = 0;

        Object.keys(dataObj).forEach(id => {
          const post = dataObj[id];
          const author = post.author_name || '';
          // Match subscribed authors (and optional author filter)
          if (subs.includes(author)) {
            if (authorFilter !== '' && author !== authorFilter) return;
            matchingPosts[id] = post;
            count++;
          }
        });

        if (count === 0) {
          const noResults = dict.no_results || "No matching posts found.";
          feedContainer.innerHTML = `
            <div class="text-center py-5 text-muted">
              <i class="bi bi-inbox fs-1 mb-2 d-block"></i>
              <p class="mb-0">${noResults}</p>
            </div>
          `;
        } else if (typeof window.renderFeedPosts === 'function') {
          window.renderFeedPosts('postsFeedContainer', matchingPosts, 'all');
        }
      }

      if (!skipTranslations && window.applyUiTranslations) window.applyUiTranslations(currentLang);
    }

    function filterByAuthor(authorName) {
      currentAuthorFilter = authorName;
      renderSubscriptionsPage(currentSubTab, currentAuthorFilter);
    }

    function renderSuggestedAuthors(subs, dict) {
      const grid = document.getElementById('suggestedAuthorsGrid');
      if (!grid) return;

      const candidates = [
        { name: 'Hồ Quốc Tuấn', role: 'Economics Lead', avatar: 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?auto=format&fit=crop&q=80&w=60&h=60' },
        { name: 'Elena Rostova', role: 'Artificial Intelligence Lead', avatar: 'https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&q=80&w=60&h=60' },
        { name: 'Thái Dương', role: 'Tech Lead & Architecture', avatar: 'https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?auto=format&fit=crop&q=80&w=60&h=60' },
        { name: 'Hoàng Anh', role: 'UX & Product Design', avatar: 'https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&q=80&w=60&h=60' }
      ];

      let html = '';
      const followBtnText = dict.btn_follow || "Follow";
      const followingBtnText = dict.btn_following || "Following";

      candidates.forEach(c => {
        const isSubbed = subs.includes(c.name);
        html += `
          <div class="col-12 mb-3">
            <div class="card bg-light border-0 rounded-4 p-3 d-flex flex-row align-items-center h-100">
              <img src="${c.avatar}" class="rounded-circle border border-white shadow-sm me-3" width="50" height="50" alt="${c.name}" style="object-fit: cover;">
              <div class="flex-grow-1">
                <h6 class="fw-bold mb-0 text-main" style="font-size: 0.95rem;">${c.name}</h6>
                <p class="text-muted small mb-0">${c.role}</p>
              </div>
              <button class="btn ${isSubbed ? 'btn-outline-secondary subscribed' : 'btn-outline-primary'} btn-sm rounded-pill fw-medium btn-subscribe px-3" onclick="toggleAuthorSubscription('${c.name.replace(/'/g, "\\'")}', event)">${isSubbed ? followingBtnText : followBtnText}</button>
            </div>
          </div>
        `;
      });
      grid.innerHTML = html;
    }
    window.renderSubscriptionsPage = renderSubscriptionsPage;

    // Live Search Filter for feed
    function filterFeedPosts(val) {
      const desktopInput = document.getElementById('feedSearchInput');
      const mobileInput = document.getElementById('mobileFeedSearchInput');
      const filter = (val !== undefined ? val : (desktopInput ? desktopInput.value : '')).toLowerCase();
      if (desktopInput && desktopInput.value.toLowerCase() !== filter) desktopInput.value = filter;
      if (mobileInput && mobileInput.value.toLowerCase() !== filter) mobileInput.value = filter;

      const posts = document.querySelectorAll('#postsFeedContainer .substack-post, #postsFeedContainer .manage-author-card');
      posts.forEach(item => {
        const text = item.textContent.toLowerCase();
        if (text.includes(filter)) {
          item.classList.remove('d-none');
        } else {
          item.classList.add('d-none');
        }
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      // Tab click events
      document.querySelectorAll('.subscriptions-tab-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.preventDefault();
          const tab = btn.getAttribute('data-tab');
          renderSubscriptionsPage(tab, currentAuthorFilter);
        });
      });

      // Render initial
      renderSubscriptionsPage('all', '');
    });

    // Toggle Feed Likes simulation
    function toggleLike(btn, baseCount) {
      const icon = btn.querySelector('i');
      const text = btn.querySelector('.like-count');
      const isLiked = btn.classList.toggle('liked');

      if (isLiked) {
        icon.className = 'bi bi-heart-fill';
        text.textContent = baseCount + 1;
      } else {
        icon.className = 'bi bi-heart';
        text.textContent = baseCount;
      }
    }
  </script>
</body>

</html>
