<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/images/lingora-mark.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Lingora</title>
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
  <!-- Bootstrap 5.3 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  
  <!-- Custom CSS (Standard Shared Assets) -->
<link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/base.css?v=1784089471951">
  <link rel="stylesheet" href="assets/css/layouts.css?v=1784089471951">
<link rel="stylesheet" href="assets/css/components.css?v=14">
</head>
<body class="auth-body">
  


  <div class="auth-container">
    <div class="auth-card shadow-sm border">
      <!-- Header Logo / Title -->
      <div class="auth-header text-center mb-4 position-relative pt-3">
        <!-- Compact Top Right Controls -->
        <div class="position-absolute top-0 end-0 d-flex gap-1 mt-1 me-2" style="top: 8px !important;">
          <div class="dropdown">
            <button class="btn btn-sm btn-outline-secondary d-flex align-items-center justify-content-center p-0" type="button" id="authLangDropdown" data-bs-toggle="dropdown" aria-expanded="false" style="width: 28px; height: 28px; border-radius: 6px; border-color: var(--border-color);">
              <img src="https://flagcdn.com/w20/gb.png" width="18" height="13" id="currentLangFlag" style="border-radius:2px; object-fit: cover;" alt="Language">
            </button>
            <ul class="dropdown-menu dropdown-menu-end shadow border-light-subtle" aria-labelledby="authLangDropdown" style="min-width: 120px; border-radius: 12px; font-size: 14px;">
              <li><a class="dropdown-item py-1.5 fw-medium global-lang-select" href="#" data-lang="en"><img src="https://flagcdn.com/w20/gb.png" width="18" alt="English" class="me-2" style="border-radius:2px;"> English</a></li>
              <li><a class="dropdown-item py-1.5 fw-medium global-lang-select" href="#" data-lang="vi"><img src="https://flagcdn.com/w20/vn.png" width="18" alt="Tiếng Việt" class="me-2" style="border-radius:2px;"> Tiếng Việt</a></li>
              <li><a class="dropdown-item py-1.5 fw-medium global-lang-select" href="#" data-lang="zh"><img src="https://flagcdn.com/w20/cn.png" width="18" alt="中文" class="me-2" style="border-radius:2px;"> 中文</a></li>
            </ul>
          </div>
          <button class="btn btn-sm btn-outline-secondary d-flex align-items-center justify-content-center p-0" id="themeToggle" style="width: 28px; height: 28px; border-radius: 6px; border-color: var(--border-color); color: var(--text-main);" aria-label="Toggle theme">
            <i class="bi bi-moon-fill" id="themeIcon" style="font-size: 13px;"></i>
          </button>
        </div>
        <a href="index.html" class="auth-logo d-inline-flex align-items-center gap-2 text-decoration-none">
          <i class="bi bi-bookmark-fill text-primary fs-3"></i>
          <span class="fs-4 fw-bold text-main">Lingora</span>
        </a>
        <h2 class="auth-title mt-3 fw-bold text-main" data-i18n="create_account">Create Account</h2>
      </div>

      <!-- Alert Message -->
      <div id="authAlert" class="alert alert-danger d-none p-2.5 rounded-3 mb-3 small" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-1"></i> <span id="authAlertText">Error message here.</span>
      </div>

      <!-- Register Form -->
      <form id="registerForm" novalidate>
        <div class="mb-3">
          <label for="regName" class="form-label font-medium small" data-i18n="full_name">Full Name</label>
          <div class="input-group">
            <span class="input-group-text bg-transparent border-end-0 text-muted py-2"><i class="bi bi-person"></i></span>
            <input type="text" id="regName" class="form-control border-start-0 py-2" placeholder="Elena Rostova" minlength="2" maxlength="80" autocomplete="name" required>
          </div>
          <div class="auth-field-error" id="regNameError" aria-live="polite"></div>
        </div>

        <div class="mb-3">
          <label for="regEmail" class="form-label font-medium small" data-i18n="col_email">Email</label>
          <div class="input-group">
            <span class="input-group-text bg-transparent border-end-0 text-muted py-2"><i class="bi bi-envelope"></i></span>
            <input type="email" id="regEmail" class="form-control border-start-0 py-2" placeholder="name@example.com" autocomplete="email" required>
          </div>
          <div class="auth-field-error" id="regEmailError" aria-live="polite"></div>
        </div>
        
        <div class="mb-3">
          <label for="regPassword" class="form-label font-medium small" data-i18n="password">Password</label>
          <div class="input-group">
            <span class="input-group-text bg-transparent border-end-0 text-muted py-2"><i class="bi bi-lock"></i></span>
            <input type="password" id="regPassword" class="form-control border-start-0 border-end-0 py-2" placeholder="••••••••" minlength="8" autocomplete="new-password" required>
            <button type="button" class="btn border border-start-0 text-muted bg-transparent py-2" id="togglePasswordBtn1" aria-label="Toggle password visibility">
              <i class="bi bi-eye"></i>
            </button>
          </div>
          <div class="auth-field-error" id="regPasswordError" aria-live="polite"></div>
        </div>

        <div class="mb-4">
          <label for="regConfirmPassword" class="form-label font-medium small" data-i18n="confirm_password">Confirm Password</label>
          <div class="input-group">
            <span class="input-group-text bg-transparent border-end-0 text-muted py-2"><i class="bi bi-lock-fill"></i></span>
            <input type="password" id="regConfirmPassword" class="form-control border-start-0 border-end-0 py-2" placeholder="••••••••" autocomplete="new-password" required>
            <button type="button" class="btn border border-start-0 text-muted bg-transparent py-2" id="togglePasswordBtn2" aria-label="Toggle password visibility">
              <i class="bi bi-eye"></i>
            </button>
          </div>
          <div class="auth-field-error" id="regConfirmPasswordError" aria-live="polite"></div>
        </div>

        <button type="submit" class="btn btn-primary w-100 py-2.5 rounded-pill fw-semibold mb-3" data-i18n="register">Register</button>
      </form>

      <!-- Redirect to Login -->
      <div class="text-center text-muted small">
        <span data-i18n="already_have_account">Already have an account?</span> <a href="login.html" class="text-primary fw-semibold text-decoration-none" data-i18n="login_here">Log in here</a>
      </div>

          </div>
  </div>

  <!-- Bootstrap 5 JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Core Script containing theme & language simulation -->
<script src="assets/js/core.js?v=44"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const currentLang = localStorage.getItem('preferredLanguage') || 'en';
      const flagMap = { 'en': 'gb', 'vi': 'vn', 'zh': 'cn' };
      const flagImg = document.getElementById('currentLangFlag');
      if (flagImg) {
        flagImg.src = 'https://flagcdn.com/w20/' + (flagMap[currentLang] || 'gb') + '.png';
      }
    });
  </script>
</body>
</html>
