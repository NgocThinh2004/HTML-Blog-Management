<svg fill="none" height="20" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="20"><line x1="18" x2="6" y1="6" y2="18"></line><line x1="6" x2="18" y1="6" y2="18"></line></svg>
</button>
</header>
<main class="draft-confirm-body">
<p data-i18n="draft_discard_warn">If you discard now, you will lose this post.</p>
</main>
<footer class="draft-confirm-footer">
<button class="btn fb-btn-text-light" data-draft-action="discard" type="button"><span data-i18n="delete_draft">Delete draft</span></button>
<button class="btn fb-btn-primary" data-draft-action="save" type="button"><span data-i18n="save_as_draft">Save as draft</span></button>
